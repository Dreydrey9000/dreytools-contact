<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#0a0908">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Message Drey</title>
<style>
  :root {
    --bg: #0a0908;
    --bg-1: #14110e;
    --bg-2: #1c1815;
    --bg-3: #2a2420;
    --line: #2e2722;
    --line-hot: #3a2e24;
    --text: #f5ead9;
    --text-dim: #b5a493;
    --text-muted: #6b5d4f;
    --cyan: #22d3ee;
    --cyan-dim: #0891b2;
    --red: #ef4444;
    --green: #10b981;
    --amber: #f59e0b;
    --bubble-in: #1c1815;
    --bubble-out: linear-gradient(135deg, #0891b2, #22d3ee);
    --header-h: 64px;
    --safe-top: env(safe-area-inset-top);
    --safe-bottom: env(safe-area-inset-bottom);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%;
    overscroll-behavior: none;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Inter', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
    line-height: 1.4;
    font-size: 15px;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 40% at 50% 0%, rgba(34, 211, 238, 0.06), transparent 60%),
      radial-gradient(ellipse 60% 30% at 50% 100%, rgba(245, 158, 11, 0.04), transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* APP SHELL */
  .app {
    position: relative;
    z-index: 1;
    height: 100dvh;
    max-width: 540px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    background: var(--bg);
    box-shadow: 0 0 60px rgba(0,0,0,0.4);
  }
  @media (min-width: 600px) {
    .app {
      border-left: 1px solid var(--line);
      border-right: 1px solid var(--line);
    }
  }

  /* HEADER */
  .chat-header {
    flex-shrink: 0;
    padding: calc(var(--safe-top) + 14px) 16px 14px;
    background: rgba(14, 12, 11, 0.85);
    backdrop-filter: saturate(180%) blur(24px);
    -webkit-backdrop-filter: saturate(180%) blur(24px);
    border-bottom: 1px solid var(--line);
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .back-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: transparent;
    border: none;
    color: var(--cyan);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-left: -8px;
    text-decoration: none;
  }
  .back-btn:hover { background: var(--bg-2); }
  .back-btn svg { width: 24px; height: 24px; }

  .hdr-avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--bg-3), var(--bg-2));
    border: 2px solid var(--cyan);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 800;
    color: var(--cyan);
    letter-spacing: -0.02em;
    position: relative;
    flex-shrink: 0;
  }
  .hdr-avatar::after {
    content: '';
    position: absolute;
    bottom: -2px;
    right: -2px;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: var(--green);
    border: 2.5px solid var(--bg);
    box-shadow: 0 0 8px var(--green);
  }
  .hdr-text {
    flex: 1;
    min-width: 0;
  }
  .hdr-name {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: -0.01em;
  }
  .hdr-status {
    font-size: 12px;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .hdr-status .pulse {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--green);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

  .hdr-actions {
    display: flex;
    gap: 4px;
  }
  .hdr-icon-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: transparent;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    transition: color 0.15s;
  }
  .hdr-icon-btn:hover { color: var(--cyan); background: var(--bg-2); }
  .hdr-icon-btn svg { width: 20px; height: 20px; }

  /* CHAT BODY */
  .chat-body {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 20px 16px 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: thin;
    scrollbar-color: var(--line-hot) transparent;
  }
  .chat-body::-webkit-scrollbar { width: 4px; }
  .chat-body::-webkit-scrollbar-thumb { background: var(--line-hot); border-radius: 2px; }

  .day-stamp {
    text-align: center;
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 600;
    letter-spacing: 0.06em;
    padding: 8px 0 14px;
  }

  .msg-row {
    display: flex;
    gap: 8px;
    max-width: 85%;
    align-items: flex-end;
  }
  .msg-row.in { align-self: flex-start; }
  .msg-row.out { align-self: flex-end; flex-direction: row-reverse; }
  .msg-row.out .avatar-small { display: none; }

  .avatar-small {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--bg-3), var(--bg-2));
    border: 1.5px solid var(--line-hot);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 800;
    color: var(--cyan);
    flex-shrink: 0;
    margin-bottom: 4px;
  }
  .msg-row.in + .msg-row.in .avatar-small { visibility: hidden; }

  .bubble {
    padding: 10px 14px;
    border-radius: 20px;
    font-size: 15px;
    line-height: 1.35;
    word-wrap: break-word;
    animation: bubble-in 0.3s cubic-bezier(0.23, 1, 0.32, 1);
    max-width: 100%;
  }
  @keyframes bubble-in {
    from { opacity: 0; transform: translateY(8px) scale(0.95); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .msg-row.in .bubble {
    background: var(--bubble-in);
    border: 1px solid var(--line);
    border-bottom-left-radius: 6px;
    color: var(--text);
  }
  .msg-row.out .bubble {
    background: var(--bubble-out);
    color: #031417;
    font-weight: 500;
    border-bottom-right-radius: 6px;
    box-shadow: 0 4px 12px rgba(34, 211, 238, 0.2);
  }
  .bubble b {
    font-weight: 700;
  }
  .msg-row.out .bubble b { color: #021012; }

  .bubble .placeholder {
    color: rgba(3, 20, 23, 0.5);
    font-style: italic;
  }

  /* typing indicator */
  .typing {
    display: inline-flex;
    gap: 3px;
    padding: 4px 2px;
  }
  .typing span {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--text-muted);
    animation: typing 1.4s ease-in-out infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes typing {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-4px); opacity: 1; }
  }

  /* Quick-channel chips (above composer) */
  .chip-row {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding: 10px 16px 0;
    flex-shrink: 0;
    scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
  }
  .chip-row::-webkit-scrollbar { display: none; }
  .chip {
    flex-shrink: 0;
    padding: 8px 14px;
    border-radius: 20px;
    background: var(--bg-2);
    border: 1px solid var(--line);
    color: var(--text-dim);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
    text-decoration: none;
  }
  .chip:hover { color: var(--text); border-color: var(--line-hot); }
  .chip.active {
    background: rgba(34, 211, 238, 0.12);
    border-color: var(--cyan);
    color: var(--cyan);
  }
  .chip svg { width: 14px; height: 14px; }

  /* COMPOSER (bottom) */
  .composer {
    flex-shrink: 0;
    padding: 10px 12px calc(10px + var(--safe-bottom));
    background: rgba(14, 12, 11, 0.95);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border-top: 1px solid var(--line);
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .comp-row {
    display: flex;
    gap: 8px;
    align-items: stretch;
  }
  .comp-field {
    flex: 1;
    position: relative;
  }
  .comp-field input,
  .comp-field textarea {
    width: 100%;
    padding: 12px 14px;
    border: 1px solid var(--line-hot);
    background: var(--bg-2);
    color: var(--text);
    font-size: 15px;
    font-family: inherit;
    border-radius: 18px;
    outline: none;
    transition: all 0.15s;
  }
  .comp-field textarea {
    resize: none;
    min-height: 44px;
    max-height: 140px;
    line-height: 1.35;
    padding-right: 54px;
  }
  .comp-field input:focus,
  .comp-field textarea:focus {
    border-color: var(--cyan);
    background: var(--bg-1);
  }
  .comp-field.invalid input,
  .comp-field.invalid textarea {
    border-color: var(--red);
  }

  .comp-row.names {
    gap: 8px;
  }
  .comp-field input[name="name"] { border-radius: 18px; }
  .comp-field input[name="email"] { border-radius: 18px; }

  .composer-main {
    position: relative;
    display: flex;
    align-items: flex-end;
    gap: 8px;
  }

  .send-btn {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: var(--cyan);
    color: var(--bg);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
    box-shadow: 0 4px 12px rgba(34, 211, 238, 0.25);
  }
  .send-btn:hover:not(:disabled) {
    transform: scale(1.05);
    box-shadow: 0 6px 18px rgba(34, 211, 238, 0.4);
  }
  .send-btn:active:not(:disabled) { transform: scale(0.95); }
  .send-btn:disabled {
    background: var(--bg-3);
    color: var(--text-muted);
    cursor: not-allowed;
    box-shadow: none;
  }
  .send-btn svg { width: 20px; height: 20px; }

  .hint-row {
    font-size: 11px;
    color: var(--text-muted);
    display: flex;
    justify-content: space-between;
    padding: 0 6px;
  }
  .char-count { font-family: 'SF Mono', Menlo, monospace; font-variant-numeric: tabular-nums; }
  .char-count.warn { color: var(--amber); }

  /* SEND ANIMATION */
  .msg-row.sending {
    animation: send-up 0.5s cubic-bezier(0.23, 1, 0.32, 1);
  }
  @keyframes send-up {
    from { transform: translateY(40px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  /* DELIVERED STATE */
  .delivered {
    align-self: flex-end;
    font-size: 10px;
    color: var(--text-muted);
    margin-top: -4px;
    padding-right: 8px;
    letter-spacing: 0.04em;
    font-weight: 600;
    text-transform: uppercase;
  }

  /* PREVENT IOS ZOOM ON INPUT FOCUS */
  @supports (-webkit-touch-callout: none) {
    .comp-field input,
    .comp-field textarea {
      font-size: 16px;
    }
  }
</style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <header class="chat-header">
    <a class="back-btn" href="https://showcase.dreytools.com" aria-label="Back to showcase">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </a>
    <div class="hdr-avatar">DR</div>
    <div class="hdr-text">
      <div class="hdr-name">Drey</div>
      <div class="hdr-status"><span class="pulse"></span> Online · replies &lt; 24h</div>
    </div>
    <div class="hdr-actions">
      <a class="hdr-icon-btn" href="https://instagram.com/itisdrey" target="_blank" rel="noopener" aria-label="Instagram">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>
      </a>
      <a class="hdr-icon-btn" href="https://drdrey.com" target="_blank" rel="noopener" aria-label="Music">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
      </a>
    </div>
  </header>

  <!-- CHAT BODY -->
  <main class="chat-body" id="chat-body">
    <div class="day-stamp" id="day-stamp">Today</div>

    <!-- Incoming: greeting -->
    <div class="msg-row in">
      <div class="avatar-small">DR</div>
      <div class="bubble">Hey — what's up?</div>
    </div>
    <div class="msg-row in">
      <div class="avatar-small">DR</div>
      <div class="bubble">Drop your name, email, and what you're working on. I'll hit you back.</div>
    </div>

    <!-- Live preview bubble (outgoing) -->
    <div class="msg-row out" id="preview-row">
      <div class="bubble" id="preview-bubble">
        <span class="placeholder">Start typing below...</span>
      </div>
    </div>

    <!-- Sent messages get appended here by JS -->
  </main>

  <!-- TOPIC CHIPS -->
  <div class="chip-row" id="chip-row">
    <button class="chip active" data-topic="General" type="button">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
      General
    </button>
    <button class="chip" data-topic="Build / Collab" type="button">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
      Build · Collab
    </button>
    <button class="chip" data-topic="1 Button Business" type="button">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="4"/></svg>
      1BB
    </button>
    <button class="chip" data-topic="DR. DREY Music" type="button">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
      Music
    </button>
    <button class="chip" data-topic="Hire / Work together" type="button">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 7h-3V4a2 2 0 0 0-2-2H9a2 2 0 0 0-2 2v3H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/></svg>
      Hire
    </button>
  </div>

  <!-- COMPOSER -->
  <form class="composer" id="contact-form" autocomplete="on" novalidate>
    <div class="comp-row names">
      <div class="comp-field" data-field="name">
        <input type="text" name="name" id="name" placeholder="Your name" autocomplete="name" maxlength="80" required />
      </div>
      <div class="comp-field" data-field="email">
        <input type="email" name="email" id="email" placeholder="Your email" autocomplete="email" required />
      </div>
    </div>

    <div class="composer-main">
      <div class="comp-field" data-field="message" style="flex:1;">
        <textarea name="message" id="message" placeholder="Write a message..." maxlength="2000" required rows="1"></textarea>
      </div>
      <button type="submit" class="send-btn" id="send-btn" disabled aria-label="Send message">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3.4 20.4l17.45-7.48a1 1 0 0 0 0-1.84L3.4 3.6a1 1 0 0 0-1.39 1.05l1.2 6.87a1 1 0 0 0 .8.8l10.41 1.68-10.41 1.68a1 1 0 0 0-.8.8l-1.2 6.87a1 1 0 0 0 1.39 1.05z"/></svg>
      </button>
    </div>

    <div class="hint-row">
      <span>Topic: <b id="topic-label">General</b></span>
      <span class="char-count" id="char-count">0 / 2000</span>
    </div>
  </form>

</div>

<script>
  const form = document.getElementById('contact-form');
  const nameEl = document.getElementById('name');
  const emailEl = document.getElementById('email');
  const messageEl = document.getElementById('message');
  const sendBtn = document.getElementById('send-btn');
  const previewBubble = document.getElementById('preview-bubble');
  const previewRow = document.getElementById('preview-row');
  const chatBody = document.getElementById('chat-body');
  const charCount = document.getElementById('char-count');
  const topicLabel = document.getElementById('topic-label');
  const chipRow = document.getElementById('chip-row');
  const dayStamp = document.getElementById('day-stamp');

  let currentTopic = 'General';
  const EMAIL_RE = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

  // Day stamp: show today's weekday + time
  const now = new Date();
  const wd = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][now.getDay()];
  const hh = now.getHours();
  const mm = now.getMinutes().toString().padStart(2,'0');
  const ampm = hh >= 12 ? 'PM' : 'AM';
  const h12 = hh % 12 === 0 ? 12 : hh % 12;
  dayStamp.textContent = `${wd} · ${h12}:${mm} ${ampm}`;

  // Escape HTML for safe rendering in preview
  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function escapeAttr(str) {
    return str.replace(/&/g, '&amp;').replace(/"/g, '&quot;');
  }

  // Live preview update
  function updatePreview() {
    const name = nameEl.value.trim();
    const msg = messageEl.value.trim();

    if (!name && !msg) {
      previewBubble.textContent = '';
      const ph = document.createElement('span');
      ph.className = 'placeholder';
      ph.textContent = 'Start typing below...';
      previewBubble.appendChild(ph);
      return;
    }

    // Build preview safely
    previewBubble.textContent = '';
    if (name) {
      const intro = document.createElement('div');
      intro.textContent = `Hey Drey — I'm ${name}.`;
      previewBubble.appendChild(intro);
    }
    if (msg) {
      const body = document.createElement('div');
      body.style.marginTop = name ? '6px' : '0';
      body.textContent = msg;
      previewBubble.appendChild(body);
    } else if (name) {
      const ph = document.createElement('div');
      ph.className = 'placeholder';
      ph.style.marginTop = '6px';
      ph.textContent = 'Tell me what you need...';
      previewBubble.appendChild(ph);
    }
  }

  function updateCharCount() {
    const len = messageEl.value.length;
    charCount.textContent = `${len} / 2000`;
    charCount.classList.toggle('warn', len > 1800);
  }

  function validate() {
    const name = nameEl.value.trim();
    const email = emailEl.value.trim();
    const msg = messageEl.value.trim();
    return name.length >= 1 && EMAIL_RE.test(email) && msg.length >= 10;
  }

  function updateSendBtn() {
    sendBtn.disabled = !validate();
  }

  // Auto-grow textarea
  function autoGrow() {
    messageEl.style.height = 'auto';
    messageEl.style.height = Math.min(messageEl.scrollHeight, 140) + 'px';
  }

  [nameEl, emailEl, messageEl].forEach(el => {
    el.addEventListener('input', () => {
      updatePreview();
      updateCharCount();
      updateSendBtn();
      if (el === messageEl) autoGrow();
    });
  });

  // Chip selection
  chipRow.addEventListener('click', e => {
    const chip = e.target.closest('.chip');
    if (!chip) return;
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    currentTopic = chip.dataset.topic;
    topicLabel.textContent = currentTopic;
  });

  // Build sent message bubble
  function appendSentBubble(content, topic) {
    const row = document.createElement('div');
    row.className = 'msg-row out sending';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';

    const topicLine = document.createElement('div');
    topicLine.style.fontSize = '11px';
    topicLine.style.fontWeight = '800';
    topicLine.style.letterSpacing = '0.06em';
    topicLine.style.textTransform = 'uppercase';
    topicLine.style.opacity = '0.7';
    topicLine.style.marginBottom = '4px';
    topicLine.textContent = topic;
    bubble.appendChild(topicLine);

    const body = document.createElement('div');
    body.textContent = content;
    bubble.appendChild(body);

    row.appendChild(bubble);
    chatBody.appendChild(row);

    const delivered = document.createElement('div');
    delivered.className = 'delivered';
    delivered.textContent = 'Delivered';
    chatBody.appendChild(delivered);

    // Scroll to bottom
    chatBody.scrollTop = chatBody.scrollHeight;
  }

  // Typing indicator (Drey "typing back")
  function appendTypingIndicator() {
    const row = document.createElement('div');
    row.className = 'msg-row in';
    row.id = 'typing-row';

    const av = document.createElement('div');
    av.className = 'avatar-small';
    av.textContent = 'DR';
    row.appendChild(av);

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    const typing = document.createElement('div');
    typing.className = 'typing';
    for (let i = 0; i < 3; i++) {
      const dot = document.createElement('span');
      typing.appendChild(dot);
    }
    bubble.appendChild(typing);
    row.appendChild(bubble);

    chatBody.appendChild(row);
    chatBody.scrollTop = chatBody.scrollHeight;
  }

  function appendReplyBubble(text) {
    const typingRow = document.getElementById('typing-row');
    if (typingRow) typingRow.remove();

    const row = document.createElement('div');
    row.className = 'msg-row in';
    const av = document.createElement('div');
    av.className = 'avatar-small';
    av.textContent = 'DR';
    row.appendChild(av);

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;
    row.appendChild(bubble);

    chatBody.appendChild(row);
    chatBody.scrollTop = chatBody.scrollHeight;
  }

  // Submit handler
  form.addEventListener('submit', e => {
    e.preventDefault();
    if (!validate()) return;

    const name = nameEl.value.trim();
    const email = emailEl.value.trim();
    const msg = messageEl.value.trim();
    const topic = currentTopic;

    // Compose mailto
    const subject = `[${topic}] from ${name}`;
    const body = `${msg}\n\n—\nFrom: ${name} <${email}>\nSent via contact.dreytools.com`;
    const mailto = `mailto:dreydrey9000@gmail.com?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;

    // Hide preview, append sent bubble
    previewRow.style.display = 'none';
    appendSentBubble(msg, topic);

    // Trigger mailto after brief animation
    setTimeout(() => {
      window.location.href = mailto;
    }, 400);

    // After short delay, show Drey "typing" then reply
    setTimeout(appendTypingIndicator, 900);
    setTimeout(() => {
      appendReplyBubble(`Got it, ${name.split(' ')[0]}. Your email client should've popped open — hit send there and I'll reply within 24h.`);
    }, 2200);

    // Reset form
    form.reset();
    updateCharCount();
    autoGrow();
    updateSendBtn();
    messageEl.blur();

    // Re-show preview after a moment (ready for another message)
    setTimeout(() => {
      previewRow.style.display = '';
      updatePreview();
    }, 3500);
  });

  // Initial state
  updatePreview();
  updateCharCount();
  updateSendBtn();
  autoGrow();

  // Enter to send (on desktop), shift+enter for newline
  messageEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey && !window.matchMedia('(max-width: 640px)').matches) {
      e.preventDefault();
      if (validate()) form.requestSubmit();
    }
  });
</script>
</body>
</html>
